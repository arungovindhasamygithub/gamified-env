<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | EcoQuest</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <h2>EcoQuest</h2>
    <div><a href="index.html">Home</a><a href="login.html">Login</a></div>
</nav>

<div class="container" style="max-width: 600px;">
    <div class="card">
        <h2 style="text-align: center;">Create an Account</h2>
        <form onsubmit="handleRegister(event)" class="grid-2">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="regName" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="regEmail" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="regPassword" required>
            </div>
            <div class="form-group">
                <label>Account Role</label>
                <select id="regRole">
                    <option value="student">Student</option>
                    <option value="admin">Administrator</option>
                </select>
            </div>
            <div class="form-group">
                <label>School / Institution</label>
                <input type="text" id="regSchool" required>
            </div>
            <div class="form-group">
                <label>Grade / Year</label>
                <input type="text" id="regGrade" required>
            </div>
            <div style="grid-column: span 2;">
                <button type="submit">Complete Registration</button>
            </div>
        </form>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
